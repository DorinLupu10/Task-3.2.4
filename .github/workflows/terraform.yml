name: Terraform CI

on:
  push:
    branches:
      - feature/task3.2.4

jobs:
  terraform:
    name: Terraform Checks
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Format check
        run: terraform fmt -check -recursive
